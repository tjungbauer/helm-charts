# SonarQube / SonarScanner configuration for the helm-charts monorepo.
# https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/analysis-parameters/

sonar.projectKey=Helm-Charts
sonar.projectName=Helm Charts

# Primary source roots (adjust if your scanner command overrides these).
sonar.sources=charts,scripts

# Packaged subcharts, caches, and local scanner output.
sonar.exclusions=\
  **/charts/**/charts/**,\
  **/.helm-cache/**,\
  **/.scannerwork/**,\
  **/examples/**,\
  **/test-chart/**

# Helm/Go template loop variables (e.g. $key_labels, $value_labels) are not
# Kubernetes resource names. Rule kubernetes:S117 expects camelCase ($labelKey)
# and produces false positives on idiomatic Helm templates.
sonar.issue.ignore.multicriteria=helm_tpl_var_naming

sonar.issue.ignore.multicriteria.helm_tpl_var_naming.ruleKey=kubernetes:S117
sonar.issue.ignore.multicriteria.helm_tpl_var_naming.resourceKey=**/charts/**/templates/**
