name: Lint and Test Charts

on: 
  # push:
  #   branches: 
  #     - main
  #   paths:
  #     - 'charts/**'
  pull_request:
    paths:
      - 'charts/**'
  workflow_dispatch:
  # Only run when documentation PR is merged (not on every completion)
  workflow_run:
    workflows: ["Update Chart Documentation"]
    types:
      - completed
    branches:
      - main

jobs:
  lint-test:
    # Skip if this is a workflow_run trigger and the previous workflow didn't succeed
    if: >
      github.event_name != 'workflow_run' || 
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
          
      # Cache Python dependencies
      - name: Cache Python dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Detect changed charts
        id: list-changed
        run: |
          set -euo pipefail
          TARGET_BRANCH="${{ github.event.repository.default_branch }}"
          native=$(./scripts/list-charts-to-test.sh --native --target-branch "$TARGET_BRANCH" || true)
          charts=$(./scripts/list-charts-to-test.sh --target-branch "$TARGET_BRANCH" || true)

          tpl_dependents=""
          if echo "$native" | grep -qx 'charts/tpl'; then
            while IFS= read -r chart; do
              [[ -z "${chart// }" ]] && continue
              if ! echo "$native" | grep -qx "$chart"; then
                tpl_dependents="${tpl_dependents:+$tpl_dependents,}${chart}"
              fi
            done <<< "$charts"
          fi

          if [[ -n "$(echo "$charts" | awk 'NF')" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed charts (native):"
            echo "$native"
            echo "Charts to test (including tpl dependents when applicable):"
            echo "$charts"
            echo "charts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$charts" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "tpl-dependents=${tpl_dependents}" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No charts changed"
          fi

      - name: Set up Helm
        if: steps.list-changed.outputs.changed == 'true'
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cache Helm repositories
      - name: Cache Helm repositories
        if: steps.list-changed.outputs.changed == 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/helm/repository
          key: ${{ runner.os }}-helm-${{ hashFiles('**/Chart.lock') }}
          restore-keys: |
            ${{ runner.os }}-helm-

      - name: Add Helm repositories
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          # Common repos + any URL used in Chart.yaml/Chart.lock (helm dependency build needs a matching helm repo)
          helm repo add stable https://charts.helm.sh/stable
          helm repo add incubator https://charts.helm.sh/incubator
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add tjungbauer https://charts.stderr.at/
          helm repo add sonarsource https://SonarSource.github.io/helm-chart-sonarqube
          helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
          helm repo update

      # Ensures Chart.lock resolves and vendored charts/*/charts/*.tgz match `helm dependency build`.
      - name: Verify Helm dependency build matches committed files
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r chart; do
            [[ -z "${chart// }" ]] && continue
            case "$chart" in
              charts/test-chart) continue ;;
            esac
            if [[ -f "$chart/Chart.yaml" ]] && grep -q '^dependencies:' "$chart/Chart.yaml"; then
              echo "helm dependency build $chart"
              helm dependency build "$chart"
            fi
          done <<< "${{ steps.list-changed.outputs.charts }}"
          if ! git diff --exit-code; then
            echo "::error::Tracked files changed after helm dependency build — run helm dependency build (or update) locally and commit Chart.lock and/or charts/*/charts/*.tgz"
            git diff
            exit 1
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          echo "Linting changed charts: ${{ steps.list-changed.outputs.charts }}"
          ct lint --debug --target-branch ${{ github.event.repository.default_branch }}
          if [[ -n "${{ steps.list-changed.outputs.tpl-dependents }}" ]]; then
            echo "Linting tpl dependents (no version increment check): ${{ steps.list-changed.outputs.tpl-dependents }}"
            ct lint --debug --charts "${{ steps.list-changed.outputs.tpl-dependents }}" --check-version-increment=false
          fi

      # Add dependency update step
      - name: Update chart dependencies
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          while IFS= read -r chart; do
            [[ -z "${chart// }" ]] && continue
            if [[ -f "$chart/Chart.yaml" ]]; then
              echo "Updating dependencies for $chart"
              helm dependency update "$chart" || echo "No dependencies to update for $chart"
            fi
          done <<< "${{ steps.list-changed.outputs.charts }}"

      # Optional: Add chart testing with kind cluster
      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          charts_csv=$(echo "${{ steps.list-changed.outputs.charts }}" | paste -sd, -)
          echo "Testing installation of charts: $charts_csv"
          ct install --charts "$charts_csv"
