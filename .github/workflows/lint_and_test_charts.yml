name: Lint and Test Charts

on: 
  # push:
  #   branches: 
  #     - main
  #   paths:
  #     - 'charts/**'
  pull_request:
    paths:
      - 'charts/**'
  workflow_dispatch:
  # Only run when documentation PR is merged (not on every completion)
  workflow_run:
    workflows: ["Update Chart Documentation"]
    types:
      - completed
    branches:
      - main

jobs:
  lint-test:
    # Skip if this is a workflow_run trigger and the previous workflow didn't succeed
    if: >
      github.event_name != 'workflow_run' || 
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
          
      # Cache Python dependencies
      - name: Cache Python dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Cache Helm repositories
      - name: Cache Helm repositories
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.cache/helm/repository
          key: ${{ runner.os }}-helm-${{ hashFiles('**/Chart.lock') }}
          restore-keys: |
            ${{ runner.os }}-helm-

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Add Helm repositories
        run: |
          # Common repos + any URL used in Chart.yaml/Chart.lock (helm dependency build needs a matching helm repo)
          helm repo add stable https://charts.helm.sh/stable
          helm repo add incubator https://charts.helm.sh/incubator
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add tjungbauer https://charts.stderr.at/
          helm repo add sonarsource https://SonarSource.github.io/helm-chart-sonarqube
          helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
          helm repo update

      # Ensures Chart.lock resolves and vendored charts/*/charts/*.tgz match `helm dependency build`.
      - name: Verify Helm dependency build matches committed files
        run: |
          set -euo pipefail
          for chart in charts/*/Chart.yaml; do
            [[ -f "$chart" ]] || continue
            case "$chart" in
              charts/test-chart/*) continue ;;
            esac
            if grep -q '^dependencies:' "$chart"; then
              dir=$(dirname "$chart")
              echo "helm dependency build $dir"
              helm dependency build "$dir"
            fi
          done
          if ! git diff --exit-code; then
            echo "::error::Tracked files changed after helm dependency build — run helm dependency build (or update) locally and commit Chart.lock and/or charts/*/charts/*.tgz"
            git diff
            exit 1
          fi

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed charts: $changed"
            echo "charts<<EOF" >> $GITHUB_OUTPUT
            echo "$changed" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No charts changed"
          fi
   
      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          echo "Linting changed charts: ${{ steps.list-changed.outputs.charts }}"
          ct lint --debug --target-branch ${{ github.event.repository.default_branch }}

      # Add dependency update step
      - name: Update chart dependencies
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          for chart in $(ct list-changed --target-branch ${{ github.event.repository.default_branch }}); do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Updating dependencies for $chart"
              helm dependency update "$chart" || echo "No dependencies to update for $chart"
            fi
          done

      # Optional: Add chart testing with kind cluster
      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "Testing installation of changed charts: ${{ steps.list-changed.outputs.charts }}"
          ct install --target-branch ${{ github.event.repository.default_branch }}
