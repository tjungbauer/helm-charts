{{- range $key, $value := .Values.aide }}
{{- with $value }}
{{- if include "tpl.isEnabled" .enabled }}
---
apiVersion: fileintegrity.openshift.io/v1alpha1
kind: FileIntegrity
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default "10")
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
spec:
  config:
    gracePeriod: {{ .config.gracePeriod | default "900" }}
    maxBackups: {{ .config.maxBackups | default "5" }}
    {{- if include "tpl.isEnabled" .config.customconfig.enabled }}
    name: {{ .config.customconfig.name }}
    namespace: {{ .config.customconfig.namespace }}
    key: {{ .config.customconfig.key | default "config" }}
    {{- end }}

{{- /* Set tolerations */}}
{{- if .tolerations }}
{{ include "tpl.tolerations" .tolerations | indent 2 }}
{{- end }}

{{- end }}
{{- end }}
{{- end }}
