{{- range $key, $value := .Values.aide }}
{{- with $value }}
{{- if include "tpl.isEnabled" .enabled }}
{{- if include "tpl.isEnabled" .config.customconfig.enabled }}
{{- if eq (.config.customconfig.name | toString) "controlplane-aide-conf" }}
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: controlplane-aide-conf
  namespace: openshift-file-integrity
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.config.customconfig.additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.config.customconfig.syncwave | default "2")
                "extra" (.config.customconfig.additionalAnnotations | default dict)) | nindent 4 }}
data:
  controlplane-aide.conf: |+
    @@define DBDIR /hostroot/etc/kubernetes
    @@define LOGDIR /hostroot/etc/kubernetes
    database=file:@@{DBDIR}/aide.db.gz
    database_out=file:@@{DBDIR}/aide.db.gz.new
    gzip_dbout=yes
    verbose=5
    report_url=file:@@{LOGDIR}/aide.log.new
    report_url=stdout
    PERMS = p+u+g+acl+selinux+xattrs
    CONTENT_EX = sha512+ftype+p+u+g+n+acl+selinux+xattrs

    /hostroot/boot/        CONTENT_EX
    /hostroot/root/\..* PERMS
    /hostroot/root/   CONTENT_EX
    !/hostroot/root/\.kube
    !/hostroot/usr/src/
    !/hostroot/usr/tmp/

    /hostroot/usr/    CONTENT_EX

    # OpenShift specific excludes
    !/hostroot/opt/
    !/hostroot/var
    !/hostroot/etc/NetworkManager/system-connections/
    !/hostroot/etc/mtab$
    !/hostroot/etc/.*~
    !/hostroot/etc/kubernetes/static-pod-resources
    !/hostroot/etc/kubernetes/aide.*
    !/hostroot/etc/kubernetes/manifests
    !/hostroot/etc/kubernetes/kubelet-ca.crt
    !/hostroot/etc/docker/certs.d
    !/hostroot/etc/selinux/targeted
    !/hostroot/etc/openvswitch/conf.db
    !/hostroot/etc/kubernetes/cni/net.d
    !/hostroot/etc/kubernetes/cni/net.d/*
    !/hostroot/etc/machine-config-daemon/currentconfig$
    !/hostroot/etc/machine-config-daemon/node-annotation.json*
    !/hostroot/etc/pki/ca-trust/extracted/java/cacerts$
    !/hostroot/etc/cvo/updatepayloads

    # CP specific exclude
    !/opt/mydaemon/

    # Catch everything else in /etc
    /hostroot/etc/    CONTENT_EX
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
