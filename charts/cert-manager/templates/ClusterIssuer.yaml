{{- range .Values.issuer }}
{{- if include "tpl.isEnabled" .enabled }}
---
apiVersion: cert-manager.io/v1
kind: {{ .type | default "ClusterIssuer" }}
metadata:
  name: {{ .name }}
  {{- if eq (.type | toString) "Issuer" }}
  namespace: {{ .namespace | default "default" }}
  {{- end }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default "20")
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
spec:
  {{- if .selfSigned }}
  selfSigned: {}
  {{- end }}
  {{- if .ca }}
  ca:
    secretName: {{ .ca.secretName }}
  {{- end }}
  {{- if .vault }}
  vault:
    {{- toYaml .vault | nindent 4 }}
  {{- end }}
  {{- if .venafi }}
  venafi:
    {{- toYaml .venafi | nindent 4 }}
  {{- end }}
  {{- if .acme }}
  {{- with .acme }}
  acme:
    email: {{ .email }}
    {{- if include "tpl.isEnabled" .skipTLSVerify }}
    skipTLSVerify: true
    {{- else }}
    skipTLSVerify: false
    {{- end }}
    preferredChain: {{ .preferredChain | default "" }}
    privateKeySecretRef:
      name: {{ .privKeyRef | default "letsencrypt-account-key" }}
    server: {{ .server | default "https://acme-v02.api.letsencrypt.org/directory" }}
    solvers:
      {{- toYaml .solvers | nindent 6 }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
