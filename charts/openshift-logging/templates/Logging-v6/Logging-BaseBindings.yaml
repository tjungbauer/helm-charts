{{- with .Values.loggingConfig }}
{{- if or (eq ( .operatorVersion | toString) "6.0") (eq ( .operatorVersion | toString) "6") (eq ( .operatorVersion | toString) "6.x") }}
{{- if include "tpl.isEnabled" .enabled }}
{{- if .collectorServiceAccount.bindings }}
{{- range .collectorServiceAccount.bindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ . }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" ($.Values.loggingConfig.additionalLabels | default dict) | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" ($.Values.loggingConfig.syncwave | default 4)
                "extra" ($.Values.loggingConfig.additionalAnnotations | default dict)) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ . }}
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.loggingConfig.collectorServiceAccount.name | default "cluster-logging-operator" }}
    namespace: openshift-logging
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
