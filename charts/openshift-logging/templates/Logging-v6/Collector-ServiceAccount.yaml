{{- with .Values.loggingConfig }}
{{- if or (eq ( .operatorVersion | toString) "6.0") (eq ( .operatorVersion | toString) "6") (eq ( .operatorVersion | toString) "6.x") }}
{{- if include "tpl.isEnabled" .enabled }}
{{- if .collectorServiceAccount }}
{{- if include "tpl.isEnabled" .collectorServiceAccount.create }}
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: {{ .collectorServiceAccount.name | default "cluster-logging-operator" }}
  namespace: openshift-logging
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default 4)
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
