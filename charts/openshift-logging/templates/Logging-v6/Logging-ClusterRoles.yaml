{{- with .Values.loggingConfig }}
{{- if or (eq ( .operatorVersion | toString) "6.0") (eq ( .operatorVersion | toString) "6") (eq ( .operatorVersion | toString) "6.x") }}
{{- if include "tpl.isEnabled" .enabled }}
{{- range .additionalClusterRoles }}

{{- if and (eq ( .type | toString) "application") (include "tpl.isEnabled" .enabled) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .name | default "cluster-logging-write-application-logs" }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" ($.Values.loggingConfig.additionalLabels | default dict) | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default ($.Values.loggingConfig.syncwave | default 4))
                "extra" ($.Values.loggingConfig.additionalAnnotations | default dict)) | nindent 4 }}
rules:
  - apiGroups:
      - loki.grafana.com
    resources:
      - application
    resourceNames:
      - logs
    verbs:
      - create
{{- end }}


{{- if and (eq ( .type | toString) "audit") (include "tpl.isEnabled" .enabled) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .name | default "cluster-logging-write-audit-logs" }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" ($.Values.loggingConfig.additionalLabels | default dict) | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default ($.Values.loggingConfig.syncwave | default 4))
                "extra" ($.Values.loggingConfig.additionalAnnotations | default dict)) | nindent 4 }}
rules:
  - apiGroups:
      - loki.grafana.com
    resources:
      - audit
    resourceNames:
      - logs
    verbs:
      - create
{{- end }}

{{- if and (eq ( .type | toString) "infrastructure") (include "tpl.isEnabled" .enabled) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .name | default "cluster-logging-write-infrastructure-logs" }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" ($.Values.loggingConfig.additionalLabels | default dict) | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default ($.Values.loggingConfig.syncwave | default 4))
                "extra" ($.Values.loggingConfig.additionalAnnotations | default dict)) | nindent 4 }}
rules:
  - apiGroups:
      - loki.grafana.com
    resources:
      - infrastructure
    resourceNames:
      - logs
    verbs:
      - create
{{- end }}

{{- if and (eq ( .type | toString) "editor") (include "tpl.isEnabled" .enabled) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .name | default "clusterlogforwarder-editor-role" }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" ($.Values.loggingConfig.additionalLabels | default dict) | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default ($.Values.loggingConfig.syncwave | default 4))
                "extra" ($.Values.loggingConfig.additionalAnnotations | default dict)) | nindent 4 }}
rules:
  - apiGroups:
      - observability.openshift.io
    resources:
      - clusterlogforwarders
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
{{- end }}

{{- end }}
{{- end }}
{{- end }}
{{- end }}
