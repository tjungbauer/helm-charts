{{- with .Values.loggingConfig }}
{{- if or (eq ( .operatorVersion | toString) "6.0") (eq ( .operatorVersion | toString) "6") (eq ( .operatorVersion | toString) "6.x") }}
{{- if include "tpl.isEnabled" .enabled }}
{{- range .additionalClusterRoles }}

{{- if and (eq ( .type | toString) "application") (include "tpl.isEnabled" .enabled) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .name | default "cluster-logging-write-application-logs" }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" ($.Values.loggingConfig.additionalLabels | default dict) | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default ($.Values.loggingConfig.syncwave | default 4))
                "extra" ($.Values.loggingConfig.additionalAnnotations | default dict)) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .name | default "cluster-logging-write-application-logs" }}
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.loggingConfig.collectorServiceAccount.name | default "cluster-logging-operator" }}
    namespace: openshift-logging
{{- end }}

{{- if and (eq ( .type | toString) "audit") (include "tpl.isEnabled" .enabled) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .name | default "cluster-logging-write-audit-logs" }}
