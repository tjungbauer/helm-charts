subjects:
  - kind: ServiceAccount
    name: {{ $.Values.loggingConfig.collectorServiceAccount.name | default "cluster-logging-operator" }}
    namespace: openshift-logging
{{- end }}

{{- if and (eq ( .type | toString) "infrastructure") (include "tpl.isEnabled" .enabled) }}
