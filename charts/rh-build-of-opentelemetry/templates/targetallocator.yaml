{{- if include "tpl.isEnabled" .Values.targetallocator.enabled }}
{{- with .Values.targetallocator }}
{{- /* Validate allocation strategy if provided */ -}}
{{- if .allocationStrategy }}
  {{- include "otel.allocationStrategy" .allocationStrategy }}
{{- end }}
---
apiVersion: opentelemetry.io/v1beta1
kind: TargetAllocator
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace.name }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default "10")
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | nindent 4 }}
spec:
  {{- if .replicas }}
  replicas: {{ .replicas }}
  {{- end }}

  {{- if .image }}
  image: {{ .image }}
  {{- end }}

  {{- if .serviceAccount }}
  serviceAccount: {{ .serviceAccount }}
  {{- end }}

  {{- if .resources }}
  resources:
    {{- toYaml .resources | nindent 4 }}
  {{- end }}

  {{- if .nodeSelector }}
  nodeSelector:
    {{- toYaml .nodeSelector | nindent 4 }}
  {{- end }}

  {{- if .tolerations }}
  tolerations:
    {{- include "tpl.tolerations" .tolerations | nindent 2 }}
  {{- end }}

  {{- if .allocationStrategy }}
  allocationStrategy: {{ .allocationStrategy }}
  {{- end }}

  {{- if .filterStrategy }}
  filterStrategy: {{ .filterStrategy }}
  {{- end }}

  {{- if .prometheusCR }}
  prometheusCR:
    {{- if hasKey .prometheusCR "enabled" }}
    enabled: {{ .prometheusCR.enabled }}
    {{- end }}
    {{- if .prometheusCR.scrapeInterval }}
    scrapeInterval: {{ .prometheusCR.scrapeInterval }}
    {{- end }}
    {{- if .prometheusCR.podMonitorSelector }}
    podMonitorSelector:
      {{- toYaml .prometheusCR.podMonitorSelector | nindent 6 }}
    {{- end }}
    {{- if .prometheusCR.serviceMonitorSelector }}
    serviceMonitorSelector:
      {{- toYaml .prometheusCR.serviceMonitorSelector | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- if .env }}
  env:
    {{- toYaml .env | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

