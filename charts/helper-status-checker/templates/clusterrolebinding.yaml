{{- with .Values }}
{{ if include "tpl.isEnabled" .enabled }}
{{- range .checks }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .serviceAccount.name }}-{{ .namespace.name }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "helper-status-checker.labels" $.Values | indent 4 }}
  annotations:
    {{- include "helper-status-checker.hookAnnotations" (dict "values" $.Values "check" .) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .serviceAccount.name }}-{{ .namespace.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .serviceAccount.name | quote }}
    namespace: {{ .namespace.name | quote }}
{{- end }}
{{- end }}
{{- end }}
