{{- range $key, $value := .Values.applications }}
{{- if include "tpl.isEnabled" $value.enabled }}
{{- with $value }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" ($value.syncwave | default "0")
                "compareOptions" "IgnoreExtraneous"
                "extra" ($value.additionalAnnotations | default dict)) | nindent 4 }}
  labels:
    gitops.ownedBy: cluster-config
    {{- if include "tpl.isEnabled" $value.ignore_argocd_labels }}
    {{- else }}
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- end }}
    {{- include "tpl.additionalLabels" ($value.additionalLabels | default dict) | indent 4 }}
    {{- if $value.labels }}
    {{- range $key_labels, $value_labels := $value.labels }}
    {{ $key_labels }}: {{ $value_labels }}
    {{- end }}
    {{- end }}
  name: {{ $key | replace "_" "-" }}
  namespace: {{ $value.appNamespace | default "openshift-gitops" }}
spec:
  destination:
    {{- if .namespace }}
    namespace: {{ .namespace.name }}
    {{- else }}
    namespace: "openshift-gitops"
    {{- end }}
    server: {{ .server | default $.Values.general.server }}
  project: {{ .project | default "default" }}
  {{- if .syncPolicy }}
  syncPolicy:
    {{- if .syncPolicy.autosync_enabled }}
    automated:
      {{- if include "tpl.isEnabled" .syncPolicy.syncpolicy_prune }}
      prune: {{ .syncPolicy.syncpolicy_prune  }}
      {{- end }}
      {{- if include "tpl.isEnabled" .syncPolicy.syncpolicy_selfheal }}
      selfHeal: {{ .syncPolicy.syncpolicy_selfheal }}
      {{- end }}
    {{- end }}
    {{- if .syncPolicy.syncOptions }}
    syncOptions:
    {{- range .syncPolicy.syncOptions }}
      - {{ .name }}={{ .value }}
    {{- end }}
    {{- end }}
  {{- end }}
  {{- if .multiple_sources }}
  sources:
    {{- range $source_key, $source_value := .multiple_sources }}
    - repoURL: {{ .repoUrl }}
      {{- if .path }}
      path: {{ .path }}
      {{- end }}
      targetRevision: {{ .targetRevision }}
      {{- if .ref }}
      ref: {{ .ref | default "values" }}
      {{- end }}
      {{- if .chart }}
      chart: {{ .chart }}
      {{- end }}
      {{- if .helm }}
      helm:
        valueFiles:
          - {{ .helm.default_values_file }}
        {{- range .helm.additional_values_files }}
          - {{ . }}
        {{- end }}
        {{- if $value.helm }}
        {{- if $value.helm.per_cluster_helm_values }}
          - '{{ printf "%s/{{ cluster }}-values.yaml" $value.helm.per_cluster_helm_values_path }}'
        {{- end }}
        {{- end }}      
        {{- if .helm.helmvalues }}
        parameters:
        {{- range .helm.helmvalues }}
        - name: {{ .name }}
          value: '{{ .value }}' 
        {{- end }}
        {{- end }}
        {{- if .helm.releaseName }}
        releaseName: {{ .helm.releaseName }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- else }}
  source:
    {{- if .source.path }}
    path: {{ .source.path }}
    {{- else }}
    chart: {{ .source.chartname }}
    {{- end }}
    {{- if .source.helm }}
    helm:
      {{- if .source.helm.valuesfiles }}
      {{- range .source.helm.valuesfiles }}
      valueFiles: 
        - {{ .name }}
      {{- end }}
      {{- end }}
      {{- if .source.helm.releasename }}
      releaseName: {{ .source.helm.releasename }}
      {{- end }}
      parameters:
    {{- range .source.helm.helmvalues }}
        - name: {{ .name }}
          value: '{{ .value }}' 
    {{- end }}
    {{- end }}
    repoURL: {{ .source.repourl | default $.Values.general.source.repourl }}
    targetRevision: {{ .source.targetrevision | default $.Values.general.branch }}
  {{- end }}
  info:
    - name: Description
      value: {{ .description | default "No Description" }}
{{- end }}
{{- end }}
{{- end }}
