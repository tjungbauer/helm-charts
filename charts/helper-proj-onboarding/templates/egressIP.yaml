{{- range $key, $value := .Values.namespaces }}
{{- if include "tpl.isEnabled" .enabled }}
{{- if .egressIPs }}
{{- if include "tpl.isEnabled" .egressIPs.enabled }}
---
apiVersion: k8s.ovn.org/v1
kind: EgressIP
metadata:
  name: {{ .name | replace "_" "-" | quote }}
spec:
  egressIPs:
    {{- range .egressIPs.ips }}
    - {{ . }}
    {{- end }}
  namespaceSelector:
    matchLabels:
      env: {{ .name | replace "_" "-" | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}