{{- if include "tpl.isEnabled" .Values.netobserv.enabled }}
{{- with .Values.netobserv }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netobserv-writer-flp
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.rbacSyncwave | default "3")
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netobserv-writer
subjects:
- kind: ServiceAccount
  name: flowlogs-pipeline
  namespace: {{ .namespace.name | default "netobserv" }}
- kind: ServiceAccount
  name: flowlogs-pipeline-transformer
  namespace: {{ .namespace.name | default "netobserv" }}
{{- end }}
{{- end }}
