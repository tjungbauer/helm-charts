---
# -- Enable Job to create a Secret.
# @default -- false
enabled: false

# -- Syncwave for Argo CD.
# @default -- 3
syncwave: 3

# -- Seconds to retain the finished bucket-secret Job before Kubernetes deletes it
# @default -- 600
ttlSecondsAfterFinished: 600

# -- Namespace where target resource is deployed and where the Secret shall be created.
namespace: namespace-with-target-resource-and-bucket

# -- Name of Secret that shall be created.
secretname: secretname-to-create

# -- Additional annotations on Job, ServiceAccount, and ClusterRoleBinding.
# @default -- {}
additionalAnnotations: {}

# -- Additional labels on Job, ServiceAccount, and ClusterRoleBinding.
# @default -- {}
additionalLabels: {}

# Bucket Configuration
bucket:
  # -- Name of the Bucket shall has been created.
  name: bucket-name

# -- Keys that shall be used to create the Secret.
keys:
  # -- Overwrite access_key_id key.
  # @default -- access_key_id
  access_key_id: access_key_id
  # -- Overwrite access_key_secret key.
  # @default -- access_key_secret
  access_key_secret: access_key_secret
  # -- Overwrite bucket key.
  # @default -- bucket
  bucket: bucket
  # -- Overwrite endpoint key.
  # @default -- endpoint
  endpoint: endpoint
  # -- Overwrite region key. Region is only set if set_region is true.
  # @default -- region
  region: region

# -- Set region key.
# @default -- false
set_region: false
