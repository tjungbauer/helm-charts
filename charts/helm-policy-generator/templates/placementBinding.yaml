{{- if include "tpl.isEnabled" .Values.policySet.enabled }}
{{- range .Values.policySet.sets }}
{{- if .placement }}
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ .name }}-placementbinding
  namespace: {{ .namespace }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.placement.additionalLabels | default .additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.placement.placementBindingSyncwave | default "3")
                "extra" (.placement.additionalAnnotations | default .additionalAnnotations | default dict)) | nindent 4 }}
placementRef:
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
  name: {{ .name }}-placement
subjects:
- apiGroup: policy.open-cluster-management.io
  kind: PolicySet
  name: {{ .name }}
{{- end }}
{{- end }}
{{- else }}
{{- range .Values.policies }}
{{- if include "tpl.isEnabled" .enabled }}
{{- if .placement }}
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ .policyname }}-placementbinding
  namespace: {{ .namespace }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.placement.additionalLabels | default .additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.placement.placementBindingSyncwave | default "3")
                "extra" (.placement.additionalAnnotations | default .additionalAnnotations | default dict)) | nindent 4 }}
placementRef:
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
  name: {{ .policyname }}-placement
subjects:
{{- if $.Values.policySet }}
  {{- if include "tpl.isEnabled" $.Values.policySet.enabled }}
    {{- range $.Values.policySet.sets }}
- apiGroup: policy.open-cluster-management.io
  kind: PolicySet
  name: {{ .name }}
    {{- end }}
  {{- else }}
- apiGroup: policy.open-cluster-management.io
  kind: Policy
  name: {{ .policyname }}
  {{- end }}
{{- else }}
- apiGroup: policy.open-cluster-management.io
  kind: Policy
  name: {{ .policyname }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
