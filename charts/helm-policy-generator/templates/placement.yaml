{{- if include "tpl.isEnabled" .Values.policySet.enabled }}
{{- range .Values.policySet.sets }}
{{- if .placement }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ .name }}-placement
  namespace: {{ .namespace }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.placement.additionalLabels | default .additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.placement.syncwave | default .syncwave | default "2")
                "extra" (.placement.additionalAnnotations | default .additionalAnnotations | default dict)) | nindent 4 }}
spec:
  {{- if .placement.clusterSets }}
  clusterSets:
    {{- range .placement.clusterSets }}
    - {{ . }}
    {{- end }}
  {{- end }}
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
        {{- range .placement.lableSelectors }}
        - key: {{ .key }}
          operator: {{ .operator }}
          values:
          {{- range .values }}
          - {{ . }}
          {{- end }}
        {{- end }}
{{- end }}
{{- end }}

{{- else }}
{{- range .Values.policies }}
{{- if include "tpl.isEnabled" .enabled }}
{{- if .placement }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ .policyname }}-placement
  namespace: {{ .namespace }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.placement.additionalLabels | default .additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.placement.syncwave | default .syncwave | default "2")
                "extra" (.placement.additionalAnnotations | default .additionalAnnotations | default dict)) | nindent 4 }}
spec:
  {{- if .placement.clusterSets }}
  clusterSets:
    {{- range .placement.clusterSets }}
    - {{ . }}
    {{- end }}
  {{- end }}
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
        {{- range .placement.lableSelectors }}
        - key: {{ .key }}
          operator: {{ .operator }}
          values:
          {{- range .values }}
          - {{ . }}
          {{- end }}
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
