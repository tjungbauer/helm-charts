{{- if .Values.policySet }}
{{- if include "tpl.isEnabled" .Values.policySet.enabled }}
{{- range .Values.policySet.sets }}
---
apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default "1")
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
spec:
  description: {{ .description }}
  policies:
  {{- if .policies }}
    {{- range .policies }}
  - {{ . }}
    {{- end }}
  {{- else }}
    {{- range $.Values.policies }}
  - {{ .policyname }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
