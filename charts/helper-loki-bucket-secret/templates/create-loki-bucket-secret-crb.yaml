{{ if include "tpl.isEnabled" .Values.enabled }}
{{- with .Values }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: create-loki-secret-crb-{{ .namespace }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "type" "hook"
                "syncWave" (.syncwave | default 3)
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: create-loki-secret-sa
    namespace: {{ .namespace }}
{{- end }}
{{- end }}
