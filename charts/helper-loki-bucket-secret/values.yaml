---
# -- Enable Job to create a Secret for LokiStack.
# @default -- false
enabled: false

# -- Syncwave for Argo CD.
# @default -- 3
syncwave: 3

# -- Seconds to retain the finished bucket-secret Job before Kubernetes deletes it
# @default -- 600
ttlSecondsAfterFinished: 600

# -- Namespace where LokiStack is deployed and where the Secret shall be created.
namespace: namespace-with-lokistack-and-bucket

# -- Name of Secret that shall be created.
secretname: secretname-to-create

# -- Additional annotations on Job, ServiceAccount, and ClusterRoleBinding.
# @default -- {}
additionalAnnotations: {}

# -- Additional labels on Job, ServiceAccount, and ClusterRoleBinding.
# @default -- {}
additionalLabels: {}

# Bucket Configuration
bucket:
  # -- Name of the Bucket shall has been created.
  name: bucket-name
