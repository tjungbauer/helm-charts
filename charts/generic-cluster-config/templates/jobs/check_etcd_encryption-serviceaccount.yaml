{{ if include "tpl.isEnabled" .Values.apiserver.enabled }}
{{- with .Values.apiserver.etcd_encryption }}
{{ if include "tpl.isEnabled" .enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tpl.serviceAccount" .serviceAccount }}
  namespace: {{ .namespace | quote }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: {{ .syncwave | default 0 | quote }}
{{- end }}
{{- end }}
{{- end }}
