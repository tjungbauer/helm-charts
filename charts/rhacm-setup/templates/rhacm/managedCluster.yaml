{{- if .Values.rhacm.importClusters }}
{{- if include "tpl.isEnabled" .Values.rhacm.importClusters.enabled }}
{{- range .Values.rhacm.importClusters.clusters }}
{{- $labels := mergeOverwrite ($.Values.rhacm.importClusters.additionalLabels | default dict) (.additionalLabels | default dict) }}
{{- $annotations := mergeOverwrite ($.Values.rhacm.importClusters.additionalAnnotations | default dict) (.additionalAnnotations | default dict) }}
---
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: {{ .name }}
  labels:
    name: {{ .name }}
    cluster.open-cluster-management.io/clusterset: {{ .clusterSet }}
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" $labels | nindent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" ($.Values.rhacm.importClusters.managed_cluster_syncwave | default "5")
                "extra" $annotations) | nindent 4 }}
spec:
  hubAcceptsClient: true
{{- end }}
{{- end }}
{{- end }}
