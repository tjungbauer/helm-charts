---
# -- Anchor for the operator version
override-rhacm-operator-version: &rhacmversion release-2.16

rhacm:
  # Namespace, should be installed in open-cluster-management
  # @default -- open-cluster-management
  namespace:
    name: open-cluster-management

  # Configure MultiClusterHub
  multiclusterhub:

    # -- Enable MultiClusterHub object
    # @default -- false
    enabled: false

    # -- Syncwave for the MultiClusterHub
    # @default -- 3
    syncwave: '3'

    # -- Specifies deployment replication for improved availability. Options are: Basic and High
    # @default -- Basic
    availabilityConfig: Basic

    # -- Specify a nodeSelector for example to move the Pods to infrastructure nodes.
    # @default -- empty
    nodeSelector: {}
    #  key: node-role.kubernetes.io/infra
    #  value: ""

    # -- If you want this component to only run on specific nodes, you can
    # configure tolerations of tainted nodes.
    # @default -- empty
    tolerations: []
    #  - effect: NoSchedule
    #    key: infra
    #    operator: Equal
    #    value: reserved

  # -- ManagedCluster + KlusterletAddonConfig when enabled (see templates/rhacm/managedCluster.yaml)
  # This will create a new cluster in the management cluster.
  # However, this will only prepare the cluster, you still need to download and execute the command to fully integrate the new cluster.
  importClusters:
    # -- Enable the import of clusters.
    # @default -- false
    enabled: false

    # -- Syncwaves for the ManagedCluster. MUST be LOWER than klusterlet_addon_syncwave
    # @default -- 5
    managed_cluster_syncwave: '5'

    # -- Syncwave for the KlusterletAddonConfig. MUST be HIGHER than managed_cluster_syncwave
    # @default -- 10
    klusterlet_addon_syncwave: '10'

    # List of clusters to import.
    # @default -- []
    clusters:
      # - name: my-cluster
      #  clusterSet: default
      #  # Per default all addons are enabled. However, you can override this here PER CLUSTER.
      #  addons:
      #    applicationManager:
      #      enabled: true
      #    policyController:
      #      enabled: true
      #    searchCollector:
      #      enabled: true
      #    certPolicyController:
      #      enabled: true

    # -- Klusterlet addon controllers; all default to enabled. Override globally or per cluster via clusters[].addons
    # Per default all addons are enabled. However, you can override this here GLOBALLY
    addons:
      applicationManager:
        enabled: true
      policyController:
        enabled: true
      searchCollector:
        enabled: true
      certPolicyController:
        enabled: true
      iamPolicyController:
        enabled: true

  # -- Search custom resource (search-v2-operator). See RH ACM 2.16 "Customizing the Search service".
  # https://docs.redhat.com/en/documentation/red_hat_advanced_cluster_management_for_kubernetes/2.16/html/search/acm-search#customize-search-console
  search:
    # -- Enable Search custom resource.
    # @default -- false
    enabled: false

    # -- Argo CD sync wave; place after MultiClusterHub / search operator is available.
    syncwave: "15"

    # -- PostgreSQL PVC for search-postgres.
    # Omit entire key (set to null) to let the operator keep defaults (e.g. emptyDir for non-prod).
    dbStorage:
      # -- Size of the PostgreSQL PVC.
      # @default -- 10Gi
      size: 10Gi

      # storageClassName unset (set to your cluster StorageClass in production, e.g. gp2
      # @default -- none
      # storageClassName: gp2

    # -- Per-deployment tuning:
    #    collector, indexer, database, queryapi (resources, replicaCount, envVar, arguments).
    # Passed through as YAML.
    # @default -- {}
    # deployments:
    #   collector:
    #     resources:
    #       limits: { cpu: 500m, memory: 128Mi }
    #       requests: { cpu: 250m, memory: 64Mi }
    #   indexer:
    #     replicaCount: 3
    #     resources:
    #       limits: { memory: 5Gi }
    #       requests: { memory: 1Gi }
    #   database:
    #     envVar:
    #       - name: POSTGRESQL_EFFECTIVE_CACHE_SIZE
    #         value: 1024MB
    #       - name: POSTGRESQL_SHARED_BUFFERS
    #         value: 512MB
    #   queryapi:
    #     arguments:
    #       - -v=3
    deployments: {}

    # -- Hub-wide node placement for search pods (maps to spec.nodeSelector).
    # @default -- {}
    nodeSelector:
      key: node-role.kubernetes.io/infra
      value: ''

    # -- Hub-wide tolerations for search pods.
    # @default -- []
    tolerations:
      - key: storage
        operator: Equal
        value: local
        effect: NoSchedule

  # -- Search collector add-on: ConfigMap search-collector-config (AllowedResources / DeniedResources).
  # https://docs.redhat.com/en/documentation/red_hat_advanced_cluster_management_for_kubernetes/
  # @default -- false
  searchCollector:
    configMap:
      # -- Enable Search collector add-on.
      # @default -- false
      enabled: false

      # -- Namespace where the klusterlet search-collector runs.
      # @default -- open-cluster-management-agent
      namespace: open-cluster-management-agent

      # -- Syncwave for the ConfigMap.
      # @default -- 20
      syncwave: "20"

      # -- Structured rules; rendered as YAML under ConfigMap data keys AllowedResources / DeniedResources.
      # @default -- {}
      allowedResources: {}
      #   - apiGroups:
      #       - "*"
      #     resources:
      #      - services
      #      - pods
      #   - apiGroups:
      #       - admission.k8s.io
      #       - authentication.k8s.io
      #     resources:
      #       - "*"
      # deniedResources:
      #  - apiGroups:
      #       - "*"
      #     resources:
      #       - secrets
      #   - apiGroups:
      #      - admission.k8s.io
      #     resources:
      #       - policies
      #       - iampolicies
      #       - certificatepolicies

# Install Operator RHACM
# Deploys Operator --> Subscription and Operatorgroup
# Syncwave: 0
helper-operator:
  operators:
    advanced-cluster-management:
      enabled: false
      syncwave: '0'
      namespace:
        name: open-cluster-management
        create: true
      subscription:
        channel: *rhacmversion
        approval: Automatic
        operatorName: advanced-cluster-management
        source: redhat-operators
        sourceNamespace: openshift-marketplace
      operatorgroup:
        create: false
        notownnamespace: false

# Using sub-chart helper-status-checker
helper-status-checker:
  enabled: false

  checks:

    - operatorName: advanced-cluster-management
      namespace:
        name: open-cluster-management
      syncwave: 3

      serviceAccount:
        name: "sa-acm-status-checker"
