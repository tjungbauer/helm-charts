{{- with .Values }}
{{ if include "tpl.isEnabled" .enabled }}
---
apiVersion: noobaa.io/v1alpha1
kind: BackingStore
metadata:
  name: {{ .backingstore_name }}
  namespace: openshift-storage
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    app: noobaa
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default 1)
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
spec:
  {{- if .pvPool }}
  pvPool:
    numVolumes: {{ .pvPool.numOfVolumes | default "1" }}
    resources:
      requests:
        storage: {{ .backingstore_size }}
      limits:
        cpu: {{ .limits_cpu | default "500m" }}
        memory: {{ .limits_memory | default "2Gi" }}
    secret: {}
    storageClass: {{ .baseStorageClass }}
  type: {{ .pvPool.type | default "pv-pool" }}
  {{- end }}
{{- end }}
{{- end }}
