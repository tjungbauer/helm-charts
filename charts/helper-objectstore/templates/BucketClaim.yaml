{{- with .Values.bucket }}
{{ if include "tpl.isEnabled" .enabled }}
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  labels:
    {{- include "tpl.labels" $ | nindent 4 }}
    {{- include "tpl.additionalLabels" ($.Values.additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default 2)
                "extra" ($.Values.additionalAnnotations | default dict)) | nindent 4 }}
spec:
  generateBucketName: {{ .name }}
  storageClassName: {{ .storageclass | default "openshift-storage.noobaa.io" }}
{{- end }}
{{- end }}
