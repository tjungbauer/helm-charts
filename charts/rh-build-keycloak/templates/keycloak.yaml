{{- with .Values.keycloak }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  labels:
    app: sso
    {{- include "tpl.additionalLabels" (.additionalLabels | default dict) | indent 4 }}
  annotations:
    {{- include "tpl.argocdMetadata"
          (dict "syncWave" (.syncwave | default "5")
                "extra" (.additionalAnnotations | default dict)) | nindent 4 }}
  name: {{ .name | default "example-keycloak" }}
  namespace: {{ .namespace | default "keycloak" }}
spec:
  hostname:
    admin: {{ .hostname.admin | default "" }}
    adminUrl: {{ .hostname.adminUrl | default "" }}
    hostname: {{ .hostname.hostname | default "" }}
    {{- if include "tpl.isEnabled" .hostname.strict }}
    strict: true
    {{- end }}
    {{- if include "tpl.isEnabled" .hostname.strictBackchannel }}
    strictBackchannel: true
    {{- end }}
  instances: {{ .instance | default "1" }}
  image: {{ .image | default "" }}
  http:
    {{- if include "tpl.isEnabled" .http.httpEnabled }}
    httpEnabled: true
    {{- end }}
    httpPort: {{ .http.httpPort | default "" }}
    httpsPort: {{ .http.httpsPort | default "" }}
    tlsSecret: {{ .http.tlsSecret | default "" }}

  {{- if .imagePullSecrets }}
  imagePullSecrets:
  {{- range .imagePullSecrets }}
    - name: {{ . }}
  {{- end }}
  {{- end }}

  {{- if include "tpl.isEnabled" .ingress.enabled }}
  ingress:
    enabled: {{ .ingress.enabled }}
    className: {{ .ingress.className }}
  {{- end }}


  {{- if include "tpl.isEnabled" .db.use_example_db_sta }}
  db:
    vendor: postgres
    host: postgres-db
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  {{- else if .db.settings }}
  {{- with .db.settings }}
  {{- if include "tpl.isEnabled" .custom_database }}
  db:
    {{- if .usernameSecret }}
    usernameSecret:
      key: {{ .usernameSecret.key }}
      name: {{ .usernameSecret.name }}
    {{- end }}
    {{- if .passwordSecret }}
    passwordSecret:
      key: {{ .passwordSecret.key }}
      name: {{ .passwordSecret.name }}
    {{- end }}
    port: {{ .port }}
    schema: {{ .schema }}
    vendor: {{ .vendor }}
    host: {{ .host }}
    poolMaxSize: {{ .poolInitialSize }}
    url: {{ .url }}
    poolMinSize: {{ .poolMinSize }}
    database: {{ .database }}
    poolInitialSize: {{ .poolInitialSize }}
  {{- end }}
  {{- end }}
  {{- end }}

  {{- if .additionalOptions }}
  additionalOptions:
    {{- range .additionalOptions }}
    - name: {{ .name }}
      {{- if .secret }}
      secret:
        key: {{ .secret.key }}
        name: {{ .secret.name }}
      {{- end }}
      {{- if .value }}
      value: {{ .value }}
      {{- end }}
    {{- end }}
  {{- end }}

  {{- if .transaction }}
  transaction:
  {{- if include "tpl.isEnabled" .transaction.xaEnabled }}
    xaEnabled: true
  {{- end }}
  {{- end }}

  {{- if .features }}
  features:
    {{- if .features.disabled }}
    disabled:
    {{- range .features.disabled }}
      - {{ . }}
    {{- end }}
    {{- end }}
    {{- if .features.enabled }}
    enabled:
    {{- range .features.enabled }}
      - {{ . }}
    {{- end }}
    {{- end }}
  {{- end }}
  {{- with .resources }}
  resources:
    {{- if .limits }}
    limits:
      {{- if .limits.cpu }}
      cpu: {{ .limits.cpu }}
      {{- end }}
      {{- if .limits.memory }}
      memory: {{ .limits.memory }}
      {{- end }}
    {{- end }}
    {{- if .requests }}
    requests:
      {{- if .requests.cpu }}
      cpu: {{ .requests.cpu }}
      {{- end }}
      {{- if .requests.memory }}
      memory: {{ .requests.memory }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
