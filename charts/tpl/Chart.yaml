  artifacthub.io/changes: |
    - kind: added
      description: Initial release
    - kind: added
      description: tpl nodeSelector
    - kind: added
      description: tpl for sleeptimer that can be used in jobs
    - kind: added
      description: tpl to set nodeSelector and tolartion annoations for a namespace
    - kind: added
      description: new TPLs to create matchExpressions and matchLabels blocks
    - kind: added
      description: new TOLS additionalAnnotations and additionalLabels that allow to set annotations and labels freely on any resource.
    - kind: added
      description: nswitched order of tolerations
    - kind: fixed
      description: fixed issue with newline in tpl.sleeptimer
    - kind: added
      description: new TPLs to set securityContext and podSecurityContext
    - kind: added
      description: new TPLs to set podDisruptionBudget and optimized resources template and schema
    - kind: added
      description: new TPLs to create ArgoCD Applications
    - kind: fixed
      description: fixed issue with newline in tpl.sleeptimer
    - kind: added
      description: new TPL for namespace object
    - kind: fixed
      description: (1.0.27) Set Chart.yaml type to library so Helm and Artifact Hub treat tpl as a library chart
    - kind: fixed
      description: (1.0.28) Omit toleration value when operator is Exists or value is empty
    - kind: added
      description: (1.0.29) tpl.ttlSecondsAfterFinished for Job cleanup after completion
    - kind: added
      description: (1.0.30) tpl.isEnabled, tpl.argocdMetadata, tpl.jobHookMetadata, tpl.jobPodSpec, and tpl.affinity, tpl.argocdApplication finalizers render $spec.finalizers instead of root context, tpl.securityContext no longer emits fsGroup on container securityContext, tpl.podDisruptionBudget validates name, budget field, and selector; supports minAvailable 0
    - kind: added
      description: (1.0.31) tpl.topologySpreadConstraints, tpl.imagePullSecrets, tpl.env, tpl.envFrom, tpl.openshiftRoute, and tpl.networkPolicy
    - kind: changed
      description: (1.0.31) tpl.jobPodSpec supports imagePullSecrets and topologySpreadConstraints
    - kind: changed
      description: (1.0.31) tpl.namespace emits OpenShift description and display-name annotations only when set
    - kind: changed
      description: (1.0.31) tpl.resources documents appendUnit Gi/Mi behavior; values examples use explicit units; limits.nvidia removed in favor of extendedResources map
    - kind: changed
      description: (1.0.31) tpl.nodeSelector accepts legacy key/value or a multi-label map; tpl.jobPodSpec reuses tpl.nodeSelector
